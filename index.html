<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP Lead Architect AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0d1117;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* 1. The Main Chat Container */
        #chat-box {
            height: calc(100vh - 160px);
            overflow-y: auto;
            padding-bottom: 100px;
            scrollbar-width: thin;
            scrollbar-color: #30363d transparent;
        }

        /* 2. Message Bubbles */
        .message {
            display: flex;
            flex-direction: column;
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease-in-out;
        }

        /* AI Bubble - Left Aligned */
        .ai-bubble {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px 20px 20px 20px;
            padding: 16px;
            max-width: 75%;
            /* Stops the gigantic box */
            color: #d1d5db;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* User Bubble - Right Aligned */
        .user-bubble {
            align-self: flex-end;
            background: linear-gradient(135deg, #1d4ed8, #1e40af);
            border-radius: 20px 4px 20px 20px;
            padding: 12px 18px;
            max-width: 70%;
            color: white;
            box-shadow: 0 4px 15px rgba(29, 78, 216, 0.2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Markdown Styling */
        .prose strong {
            color: #60a5fa;
        }

        .prose ul {
            list-style-type: disc;
            margin-left: 20px;
        }

        .prose p {
            margin-bottom: 8px;
        }
    </style>
</head>

<body class="bg-[#0d1117] text-white h-screen flex flex-col overflow-hidden">

    <header class="p-6 border-b border-white/5 flex justify-between items-center bg-[#0d1117] z-20">
        <h1 class="text-2xl font-semibold text-blue-500">SAP Architect <span
                class="text-white/30 text-sm font-light italic">v2.0</span></h1>
        <div class="px-3 py-1 rounded-full bg-green-500/10 border border-green-500/20 text-green-500 text-xs">System
            Active</div>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 pb-32">
        <div class="glass p-4 rounded-2xl max-w-[80%] border border-white/5 text-gray-300">
            Hello. I am the Lead SAP Architect. How can I assist with your BTP or S/4HANA strategy today?
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-[#0d1117] via-[#0d1117] to-transparent">
        <div
            class="max-w-4xl mx-auto flex items-end gap-3 bg-[#161b22] rounded-2xl p-2 border border-white/10 shadow-2xl">
            <textarea id="user-input" rows="1" placeholder="Ask about Clean Core, BTP, or ABAP..."
                class="flex-1 bg-transparent text-white py-3 px-4 outline-none resize-none min-h-[50px] max-h-[200px]"></textarea>

            <button id="send-btn" onclick="sendMessage()"
                class="bg-blue-600 hover:bg-blue-500 text-white p-3 rounded-xl transition-all flex-shrink-0 mb-1 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
                </svg>
            </button>
        </div>
        <div class="text-[10px] text-center text-gray-600 mt-2 pb-2">Shift+Enter for new line | Powered by SAP RAG
            Engine</div>
    </footer>



    <script>
        // 1. Initialize conversational memory
        let chatHistory = [];

        // 2. Setup UI Listeners once the DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('user-input');

            if (!input) {
                console.error("Layout Error: 'user-input' not found. Ensure your HTML ID matches.");
                return;
            }

            // Handle Enter (Send) vs Shift+Enter (New Line)
            input.addEventListener("keydown", (e) => {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault(); // Stop line break
                    sendMessage();      // Trigger Chat
                }
            });

            // Auto-resize the text area as the user types
            input.addEventListener("input", function () {
                this.style.height = "auto";
                this.style.height = (this.scrollHeight) + "px";
            });
        });

        // 3. Main Chat Logic
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const text = input.value.trim();

            if (!text) return;

            // Reset UI State
            input.value = '';
            input.style.height = "50px";

            // Append User Message
            const userTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            chatBox.innerHTML += `
            <div class="flex justify-end mb-6 animate-fade-in">
                <div class="bg-blue-600/20 p-4 rounded-2xl border border-blue-500/30 text-white max-w-[80%] shadow-xl">
                    <p class="whitespace-pre-wrap">${text}</p>
                    <div class="text-[9px] text-blue-400 mt-2 text-right opacity-70">${userTime}</div>
                </div>
            </div>`;

            // Append Loading Placeholder
            const loadId = "load-" + Date.now();
            chatBox.innerHTML += `
            <div id="${loadId}" class="flex justify-start mb-6">
                <div class="glass p-4 rounded-2xl text-gray-400 animate-pulse italic max-w-[80%] border border-white/5">
                    Lead Architect is analyzing SAP documentation...
                </div>
            </div>`;

            // Smooth Scroll to bottom
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });

            try {
                const response = await fetch('http://127.0.0.1:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: text, history: chatHistory })
                });

                if (!response.ok) throw new Error("Server Offline");

                const data = await response.json();
                const loader = document.getElementById(loadId);

                if (data.answer) {
                    // Update Loader with Actual Response
                    loader.innerHTML = `
                    <div class="glass p-5 rounded-2xl border border-white/10 text-gray-200 max-w-[90%] shadow-2xl">
                        <div class="prose prose-invert max-w-none text-sm leading-relaxed">
                            ${marked.parse(data.answer)}
                        </div>
                        <div class="mt-4 pt-3 border-t border-white/5 flex justify-between items-center">
                            <span class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">SAP Verified Response</span>
                            <button onclick="navigator.clipboard.writeText(\`${data.answer.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)" class="text-[10px] text-gray-500 hover:text-white transition-colors">Copy Info</button>
                        </div>
                    </div>`;

                    // Update Memory (Keep context window at 5 turns)
                    chatHistory.push({ user: text, ai: data.answer });
                    if (chatHistory.length > 5) chatHistory.shift();
                }
            } catch (err) {
                document.getElementById(loadId).innerHTML = `
                <div class="bg-red-500/10 border border-red-500/20 p-4 rounded-xl text-red-400 text-xs">
                    <strong>Connection Failed:</strong> The SAP Brain is unreachable. Ensure 'python app.py' is running.
                </div>`;
            }

            // Final Scroll
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>

</html>
